<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />

<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;
    const {
      Search, Plus, X, Camera, Trash2, Link2, Check,
      Instagram, Facebook, Linkedin, Mail, FileText, Globe,
      MessageSquarePlus, ShieldCheck, AlertCircle, Sparkles,
      Copy, FileDown
    } = LucideReact;

    // ── config ─────────────────────────────────────────────
    const PROGRAMS = [
      "Guatemala","Argentina","Kenya","Bolivia – Mining / CECAP",
      "Water4All Bolivia","Houston WEP","CAB Peru / Amazon","PIP Bolivia","Other"
    ];
    const STATUSES = [
      { id:"raw", label:"Raw notes" },
      { id:"progress", label:"In progress" },
      { id:"ready", label:"Ready to share" },
    ];
    const CONSENTS = [
      { id:"pending", label:"Consent pending" },
      { id:"granted", label:"Consent granted" },
      { id:"limited", label:"Limited use only" },
      { id:"declined", label:"Do not publish" },
    ];
    const CHANNELS = [
      { id:"instagram", label:"Instagram", Icon:Instagram },
      { id:"facebook",  label:"Facebook",  Icon:Facebook  },
      { id:"linkedin",  label:"LinkedIn",  Icon:Linkedin  },
      { id:"newsletter",label:"Newsletter / e-blast", Icon:Mail },
      { id:"blog",      label:"Blog post", Icon:FileText  },
      { id:"website",   label:"Website feature", Icon:Globe },
    ];
    const COLORS = ["#14543F","#B9543C","#DE9626","#3B6E8F","#7A4A8C","#4F7A3A"];

    // ── helpers ────────────────────────────────────────────
    function uid() { return "p_"+Date.now()+"_"+Math.random().toString(36).slice(2,7); }
    function getInitials(name) {
      const p=(name||"").trim().split(/\s+/).filter(Boolean);
      if(!p.length) return "?";
      return (p[0][0]+(p[1]?p[1][0]:"")).toUpperCase();
    }
    function getColor(name) {
      let h=0; for(let i=0;i<(name||"").length;i++) h=(h*31+name.charCodeAt(i))>>>0;
      return COLORS[h%COLORS.length];
    }
    function formatDate(iso) {
      if(!iso) return "";
      return new Date(iso).toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"});
    }
    function emptyMedia() {
      const m={}; CHANNELS.forEach(c=>{m[c.id]={used:false,url:""}}); return m;
    }
    function newPerson() {
      return { id:uid(),name:"",photo:"",program:"Guatemala",location:"",role:"",
        rawInfo:"",quote:"",story:"",social:"",pullQuote:"",status:"raw",consent:"pending",
        airtableUrl:"",links:[],media:emptyMedia(),followUps:[],createdAt:Date.now(),updatedAt:Date.now() };
    }
    function consentColor(c) {
      return c==="granted"?"#14543F":c==="declined"?"#B9543C":c==="limited"?"#C9851D":"#ccc";
    }
    function resizeImage(file) {
      return new Promise((resolve,reject)=>{
        const reader=new FileReader();
        reader.onerror=reject;
        reader.onload=e=>{
          const img=new Image();
          img.onerror=reject;
          img.onload=()=>{
            const MAX=520; let w=img.width,h=img.height;
            if(w>MAX||h>MAX){ if(w>=h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
            const canvas=document.createElement("canvas");
            canvas.width=w; canvas.height=h;
            canvas.getContext("2d").drawImage(img,0,0,w,h);
            resolve(canvas.toDataURL("image/jpeg",0.82));
          };
          img.src=e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }
    async function copyToClipboard(text) {
      try { await navigator.clipboard.writeText(text); return true; } catch {
        try {
          const ta=document.createElement("textarea"); ta.value=text;
          ta.style.cssText="position:fixed;top:-999px;opacity:0";
          document.body.appendChild(ta); ta.select(); document.execCommand("copy");
          document.body.removeChild(ta); return true;
        } catch { return false; }
      }
    }

    // ── Supabase ────────────────────────────────────────────
    const SUPA_URL = "https://enxjfussxzyjuxcuwbxj.supabase.co";
    const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVueGpmdXNzeHp5anV4Y3V3YnhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MzcxNDgsImV4cCI6MjA5ODAxMzE0OH0.kBifNzxnXA8QiRADzQ9cO_6pJt-iJ7V8pgNb7ckGE9Y";
    const H = { "Content-Type":"application/json", "apikey":SUPA_KEY, "Authorization":"Bearer "+SUPA_KEY };

    const db = {
      async save(person) {
        const res = await fetch(`${SUPA_URL}/rest/v1/stories`, {
          method:"POST",
          headers:{ ...H, "Prefer":"resolution=merge-duplicates" },
          body:JSON.stringify({ id:person.id, data:person, updated_at:person.updatedAt }),
        });
        if(!res.ok){ const t=await res.text(); throw new Error(t); }
      },
      async del(id) {
        const res = await fetch(`${SUPA_URL}/rest/v1/stories?id=eq.${encodeURIComponent(id)}`, {
          method:"DELETE", headers:H,
        });
        if(!res.ok) throw new Error("HTTP "+res.status);
      },
      async list() {
        const res = await fetch(`${SUPA_URL}/rest/v1/stories?select=data&order=updated_at.desc`, { headers:H });
        if(!res.ok){ const t=await res.text(); throw new Error(t); }
        const rows = await res.json();
        return rows.map(r => typeof r.data==="object" ? r.data : JSON.parse(r.data));
      },
    };

    // ── PDF ────────────────────────────────────────────────
    async function downloadStoryPDF(person) {
      const { PDFDocument, rgb, StandardFonts } = PDFLib;
      const GREEN=rgb(0.078,0.329,0.247), MARIGOLD=rgb(0.788,0.522,0.114);
      const INK=rgb(0.106,0.165,0.141), MUTED=rgb(0.369,0.420,0.388);
      const WHITE=rgb(1,1,1), GOLD_BG=rgb(0.980,0.937,0.843);
      const SOFT_BG=rgb(0.961,0.957,0.945), LINE_C=rgb(0.906,0.886,0.847);
      const doc=await PDFDocument.create();
      const font=await doc.embedFont(StandardFonts.Helvetica);
      const fontBold=await doc.embedFont(StandardFonts.HelveticaBold);
      const fontObl=await doc.embedFont(StandardFonts.HelveticaOblique);
      const W=595,H_=842,ML=48,MR=48,CW=W-ML-MR;
      let photoImg=null;
      if(person.photo){ try{
        const b64=person.photo.split(",")[1];
        const bytes=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
        photoImg=person.photo.includes("data:image/png")?await doc.embedPng(bytes):await doc.embedJpg(bytes);
      }catch{photoImg=null;} }
      function wrap(text,f,size,maxW){
        const words=(text||"").split(" "),lines=[];let cur="";
        for(const w of words){const t=cur?cur+" "+w:w;if(f.widthOfTextAtSize(t,size)<=maxW){cur=t;}else{if(cur)lines.push(cur);cur=w;}}
        if(cur)lines.push(cur); return lines;
      }
      function wrapParas(text,f,size,maxW){
        const out=[];
        for(const para of(text||"").split("\n")){if(!para.trim()){out.push("");continue;}out.push(...wrap(para,f,size,maxW));}
        return out;
      }
      function trunc(text,f,size,maxW){
        if(!text)return"";if(f.widthOfTextAtSize(text,size)<=maxW)return text;
        let t=text;while(t.length&&f.widthOfTextAtSize(t+"…",size)>maxW)t=t.slice(0,-1);return t+"…";
      }
      const statusLabel=(STATUSES.find(s=>s.id===person.status)||{}).label||"";
      const consentLabel=(CONSENTS.find(c=>c.id===person.consent)||{}).label||"";
      const dateStr=new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
      let page,y;
      function addPage(isFirst){
        page=doc.addPage([W,H_]);
        if(!isFirst){page.drawRectangle({x:0,y:H_-8,width:W,height:8,color:GREEN});y=H_-36;}
        else{y=H_;}
      }
      function ensure(need){if(y-need<48)addPage(false);}
      addPage(true);
      page.drawRectangle({x:0,y:H_-68,width:W,height:68,color:GREEN});
      const cx=36,cy=H_-34;
      page.drawCircle({x:cx,y:cy,size:20,borderColor:rgb(1,1,1),borderWidth:1.2,color:rgb(0,0,0,0)});
      page.drawCircle({x:cx,y:cy,size:13,borderColor:MARIGOLD,borderWidth:1.2,color:rgb(0,0,0,0)});
      page.drawCircle({x:cx,y:cy,size:6,color:WHITE});
      page.drawText("United4Change",{x:64,y:H_-28,size:16,font:fontBold,color:WHITE});
      page.drawText("Ripple of Change  ·  Impact Story",{x:64,y:H_-46,size:9,font,color:rgb(1,1,1,0.75)});
      const dw=font.widthOfTextAtSize(dateStr,9);
      page.drawText(dateStr,{x:W-MR-dw,y:H_-38,size:9,font,color:rgb(1,1,1,0.65)});
      y=H_-68-24;
      const PS=80,pY=y-PS;
      if(photoImg){page.drawImage(photoImg,{x:ML,y:pY,width:PS,height:PS});}
      else{
        const col=getColor(person.name);
        const cr=parseInt(col.slice(1,3),16)/255,cg=parseInt(col.slice(3,5),16)/255,cb_=parseInt(col.slice(5,7),16)/255;
        page.drawRectangle({x:ML,y:pY,width:PS,height:PS,color:rgb(cr,cg,cb_),borderRadius:4});
        const ini=getInitials(person.name),iw=fontBold.widthOfTextAtSize(ini,26);
        page.drawText(ini,{x:ML+(PS-iw)/2,y:pY+PS/2-10,size:26,font:fontBold,color:WHITE});
      }
      const tX=ML+PS+16,tMaxW=CW-PS-16;let ty=y-15;
      page.drawText(trunc(person.name||"Unnamed",fontBold,18,tMaxW),{x:tX,y:ty,size:18,font:fontBold,color:INK});
      ty-=20;
      for(const meta of[person.program,person.location,person.role].filter(Boolean)){
        page.drawText(trunc(meta,font,10.5,tMaxW),{x:tX,y:ty,size:10.5,font,color:MUTED});ty-=15;
      }
      if(statusLabel){
        const pt=statusLabel.toUpperCase(),pw=fontBold.widthOfTextAtSize(pt,8)+16;
        page.drawRectangle({x:tX,y:ty-5,width:pw,height:16,color:rgb(0.898,0.933,0.914),borderRadius:8});
        page.drawText(pt,{x:tX+8,y:ty,size:8,font:fontBold,color:GREEN});
      }
      y=pY-20;
      page.drawLine({start:{x:ML,y},end:{x:W-MR,y},thickness:0.6,color:LINE_C});y-=18;
      if(person.pullQuote&&person.pullQuote.trim()){
        const pqLines=wrap(`"${person.pullQuote}"`,fontObl,12,CW-28),pqH=pqLines.length*17+20;
        ensure(pqH+16);
        page.drawRectangle({x:ML,y:y-pqH,width:CW,height:pqH,color:GOLD_BG});
        page.drawRectangle({x:ML,y:y-pqH,width:4,height:pqH,color:MARIGOLD});
        let qy=y-14;
        for(const l of pqLines){page.drawText(l,{x:ML+14,y:qy,size:12,font:fontObl,color:rgb(0.541,0.357,0.031)});qy-=17;}
        y-=pqH+18;
      }
      function section(label,lines,f,size,color,bg){
        const lh=size*1.6;ensure(30);
        page.drawText(label,{x:ML,y,size:8.5,font:fontBold,color:MARIGOLD});y-=6;
        page.drawLine({start:{x:ML,y},end:{x:ML+80,y},thickness:0.8,color:MARIGOLD});y-=14;
        for(const line of lines){
          ensure(lh+4);if(line===""){y-=lh*0.5;continue;}
          if(bg)page.drawRectangle({x:ML-4,y:y-3,width:CW+8,height:lh,color:bg});
          page.drawText(line,{x:ML,y,size,font:f,color});y-=lh;
        }
        y-=14;
      }
      if(person.story&&person.story.trim()) section("IMPACT STORY",wrapParas(person.story,font,11,CW),font,11,INK,null);
      if(person.social&&person.social.trim()) section("SOCIAL CAPTION",wrapParas(person.social,font,10.5,CW-12),font,10.5,rgb(0.2,0.26,0.23),SOFT_BG);
      const pages=doc.getPages();
      pages.forEach((pg,i)=>{
        pg.drawRectangle({x:0,y:0,width:W,height:30,color:GREEN});
        pg.drawText("United4Change Center  ·  Ripple of Change  ·  Confidential — "+consentLabel,{x:ML,y:9,size:7.5,font,color:rgb(1,1,1,0.6)});
        const pn=`${i+1} / ${pages.length}`;
        pg.drawText(pn,{x:W-MR-font.widthOfTextAtSize(pn,7.5),y:9,size:7.5,font,color:rgb(1,1,1,0.6)});
      });
      const bytes=await doc.save();
      const blob=new Blob([bytes],{type:"application/pdf"});
      const url=URL.createObjectURL(blob);
      const slug=(person.name||"story").toLowerCase().replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"");
      const a=document.createElement("a");a.href=url;a.download=`u4c-story-${slug}.pdf`;
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url),3000);
    }

    // ── Avatar ─────────────────────────────────────────────
    function Avatar({person,size=58,radius=14}){
      const style={width:size,height:size,borderRadius:radius,flexShrink:0};
      if(person.photo) return <img style={{...style,objectFit:"cover"}} src={person.photo} alt={person.name}/>;
      return <div style={{...style,background:getColor(person.name),display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontFamily:"'Fraunces',Georgia,serif",fontSize:Math.round(size*0.33)}}>{getInitials(person.name)}</div>;
    }

    // ── CopyButton ─────────────────────────────────────────
    function CopyButton({text}){
      const [done,setDone]=useState(false);
      if(!text?.trim()) return null;
      return <button style={{display:"inline-flex",alignItems:"center",gap:4,border:"1px solid #E7E2D8",background:"#fff",color:done?"#14543F":"#888",fontSize:11,fontWeight:500,padding:"3px 9px",borderRadius:7,cursor:"pointer",fontFamily:"inherit"}} onClick={async e=>{e.preventDefault();if(await copyToClipboard(text)){setDone(true);setTimeout(()=>setDone(false),1500);}}}>
        {done?<><Check size={11}/> Copied</>:<><Copy size={11}/> Copy</>}
      </button>;
    }

    // ── DeleteConfirm ──────────────────────────────────────
    function DeleteConfirm({onConfirm,onCancel}){
      return <div style={{position:"fixed",inset:0,background:"rgba(27,42,36,.6)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 16px"}}>
        <div style={{background:"#fff",borderRadius:14,padding:"28px 28px 22px",maxWidth:380,width:"100%",boxShadow:"0 24px 60px rgba(0,0,0,.3)"}}>
          <div style={{fontFamily:"'Fraunces',serif",fontSize:19,fontWeight:600,marginBottom:10}}>Delete this story?</div>
          <div style={{fontSize:13.5,color:"#5E6B63",marginBottom:22,lineHeight:1.5}}>This can't be undone. All data for this story will be permanently removed.</div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <button style={{display:"inline-flex",alignItems:"center",gap:7,border:"1px solid #E7E2D8",background:"#fff",color:"#1B2A24",padding:"9px 14px",borderRadius:10,fontSize:13.5,fontWeight:500,cursor:"pointer"}} onClick={onCancel}>Cancel</button>
            <button style={{display:"inline-flex",alignItems:"center",gap:7,border:"1px solid #B9543C",background:"#B9543C",color:"#fff",padding:"9px 14px",borderRadius:10,fontSize:13.5,fontWeight:500,cursor:"pointer"}} onClick={onConfirm}><Trash2 size={14}/> Delete</button>
          </div>
        </div>
      </div>;
    }

    // ── Card ───────────────────────────────────────────────
    function Card({person,onOpen}){
      const statusLabel=STATUSES.find(s=>s.id===person.status)?.label||"";
      const consentLabel=CONSENTS.find(c=>c.id===person.consent)?.label||"";
      const usedChannels=CHANNELS.filter(c=>person.media?.[c.id]?.used);
      const pillColors={raw:{bg:"#EDEBE4",color:"#6b6f67"},progress:{bg:"#FAEFD7",color:"#8a5b08"},ready:{bg:"#E5EEE9",color:"#14543F"}};
      const pc=pillColors[person.status]||pillColors.raw;
      return <div role="button" tabIndex={0} onClick={()=>onOpen(person)} onKeyDown={e=>(e.key==="Enter"||e.key===" ")&&(e.preventDefault(),onOpen(person))}
        style={{background:"#fff",border:"1px solid #E7E2D8",borderRadius:14,overflow:"hidden",cursor:"pointer",display:"flex",flexDirection:"column",transition:"box-shadow .15s,transform .15s"}}
        onMouseEnter={e=>{e.currentTarget.style.boxShadow="0 8px 26px rgba(20,84,63,.12)";e.currentTarget.style.transform="translateY(-2px)";}}
        onMouseLeave={e=>{e.currentTarget.style.boxShadow="none";e.currentTarget.style.transform="none";}}>
        <div style={{display:"flex",gap:13,padding:"16px 16px 12px"}}>
          <Avatar person={person}/>
          <div style={{minWidth:0,flex:1}}>
            <div style={{fontFamily:"'Fraunces',serif",fontWeight:600,fontSize:17,lineHeight:1.2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{person.name||"Unnamed story"}</div>
            <div style={{fontSize:12.5,color:"#5E6B63",marginTop:3}}>{person.program}{person.location?` · ${person.location}`:""}</div>
            <span style={{display:"inline-block",marginTop:7,fontSize:11,fontWeight:600,padding:"2px 9px",borderRadius:99,background:pc.bg,color:pc.color}}>{statusLabel}</span>
          </div>
        </div>
        <div style={{fontFamily:"'Fraunces',serif",fontStyle:"italic",fontSize:13.5,color:"#33433b",padding:"0 16px 12px",lineHeight:1.45}}>
          {person.quote?`"${person.quote}"`:<span style={{color:"#aaa",fontStyle:"normal"}}>No quote yet.</span>}
        </div>
        <div style={{marginTop:"auto",padding:"11px 16px",borderTop:"1px solid #E7E2D8",display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
          {usedChannels.length>0?usedChannels.map(c=>{
            const url=person.media[c.id].url;
            const badge=<span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:24,height:24,borderRadius:7,background:"#E5EEE9",color:"#14543F"}}><c.Icon size={13}/></span>;
            return url?<a key={c.id} href={url} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()}>{badge}</a>:<span key={c.id}>{badge}</span>;
          }):<span style={{fontSize:12,color:"#aaa"}}>Not shared yet</span>}
          <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8,color:"#888",fontSize:12}}>
            <span style={{width:8,height:8,borderRadius:"50%",background:consentColor(person.consent),flexShrink:0}} title={consentLabel}/>
            {person.followUps?.length>0&&<span>{person.followUps.length} update{person.followUps.length>1?"s":""}</span>}
            {person.airtableUrl&&<a href={person.airtableUrl} target="_blank" rel="noreferrer" style={{color:"#888",display:"inline-flex"}} onClick={e=>e.stopPropagation()}><Link2 size={14}/></a>}
          </div>
        </div>
      </div>;
    }

    // ── Editor ─────────────────────────────────────────────
    function Editor({person,saving,onSave,onClose,onDelete}){
      const [d,setD]=useState(()=>JSON.parse(JSON.stringify({social:"",pullQuote:"",...person})));
      const [followUpText,setFollowUpText]=useState("");
      const [genLoading,setGenLoading]=useState(false);
      const [genError,setGenError]=useState("");
      const [genLang,setGenLang]=useState("en");
      const [dlDone,setDlDone]=useState(false);
      const [confirmDel,setConfirmDel]=useState(false);
      const fileRef=useRef(null);
      function set(key,val){setD(prev=>({...prev,[key]:val}));}
      function setMedia(id,patch){setD(prev=>({...prev,media:{...prev.media,[id]:{...prev.media[id],...patch}}}));}
      async function generate(){
        if(!d.rawInfo.trim()&&!d.quote.trim()){setGenError("Add raw notes or a quote first.");return;}
        setGenLoading(true);setGenError("");
        const lang=genLang==="es"?"Spanish":"English";
        try{
          const res=await fetch("https://api.anthropic.com/v1/messages",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
              model:"claude-sonnet-4-6",max_tokens:1000,
              system:`You are a storyteller for United4Change Center (U4C), writing for the "Ripple of Change" campaign about women's leadership. Tagline: "With her, change grows." Tone: warm, dignified, specific, never pitying. Arc: Who → Impact → Reach → Call to action. Donor community = "The Ripple Circle." Write in ${lang}. Do not invent facts. Return ONLY valid JSON with keys: "story" (200-320 words), "social" (60-90 word caption with hashtags), "pullQuote" (one first-person sentence under 20 words). No markdown, no backticks.`,
              messages:[{role:"user",content:`Name: ${d.name||"unknown"}\nProgram: ${d.program}\nLocation: ${d.location||"—"}\nRole: ${d.role||"—"}\nQuote: ${d.quote||"none"}\nNotes: ${d.rawInfo||"none"}`}],
            }),
          });
          const data=await res.json();
          const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
          const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
          setD(prev=>({...prev,story:parsed.story||prev.story,social:parsed.social||prev.social,pullQuote:parsed.pullQuote||prev.pullQuote,status:prev.status==="raw"?"progress":prev.status}));
        }catch(e){setGenError("Generation failed. Please try again.");}
        finally{setGenLoading(false);}
      }
      async function handleDownload(){
        if(!d.story?.trim()){setGenError("Write or generate a polished story first.");return;}
        setDlDone("loading");
        try{await downloadStoryPDF(d);setDlDone("done");setTimeout(()=>setDlDone(false),3000);}
        catch(e){setGenError("PDF generation failed.");setDlDone(false);}
      }
      async function handlePhoto(e){
        const file=e.target.files?.[0];if(!file)return;
        try{set("photo",await resizeImage(file));}catch{}
      }
      function addFollowUp(){
        const t=followUpText.trim();if(!t)return;
        set("followUps",[{id:uid(),date:new Date().toISOString(),text:t},...(d.followUps||[])]);
        setFollowUpText("");
      }
      const S={
        overlay:{position:"fixed",inset:0,background:"rgba(27,42,36,.45)",display:"flex",justifyContent:"center",alignItems:"flex-start",padding:"28px 16px",zIndex:50,overflowY:"auto"},
        modal:{background:"#fff",borderRadius:16,width:"100%",maxWidth:680,margin:"auto",boxShadow:"0 24px 60px rgba(0,0,0,.25)"},
        head:{display:"flex",alignItems:"center",gap:12,padding:"18px 22px",borderBottom:"1px solid #E7E2D8",position:"sticky",top:0,background:"#fff",borderRadius:"16px 16px 0 0",zIndex:2},
        body:{padding:"6px 22px 22px"},
        section:{paddingTop:18,paddingBottom:4,borderTop:"1px solid #E7E2D8",marginTop:4},
        sectionLabel:{fontSize:11,textTransform:"uppercase",letterSpacing:".07em",color:"#C9851D",margin:"0 0 12px",fontWeight:600},
        field:{marginBottom:13},
        label:{display:"block",fontSize:12.5,color:"#5E6B63",marginBottom:5,fontWeight:500},
        input:{width:"100%",padding:"9px 11px",border:"1px solid #E7E2D8",borderRadius:9,fontSize:13.5,fontFamily:"inherit",color:"#1B2A24",background:"#fff",outline:"none"},
        textarea:{width:"100%",padding:"9px 11px",border:"1px solid #E7E2D8",borderRadius:9,fontSize:13.5,fontFamily:"inherit",color:"#1B2A24",background:"#fff",resize:"vertical",lineHeight:1.5,outline:"none"},
        select:{width:"100%",padding:"9px 11px",border:"1px solid #E7E2D8",borderRadius:9,fontSize:13.5,fontFamily:"inherit",color:"#1B2A24",background:"#fff",outline:"none"},
        row2:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11},
        btn:{display:"inline-flex",alignItems:"center",gap:7,border:"1px solid #E7E2D8",background:"#fff",color:"#1B2A24",padding:"9px 14px",borderRadius:10,fontSize:13.5,fontWeight:500,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"},
        btnPrimary:{background:"#14543F",color:"#fff",borderColor:"#14543F"},
        btnGhost:{border:"1px solid transparent",background:"transparent",color:"#888"},
        btnGen:{background:"#C9851D",color:"#fff",borderColor:"#C9851D"},
        btnDl:{background:"#14543F",color:"#fff",borderColor:"#14543F"},
        foot:{display:"flex",gap:10,alignItems:"center",padding:"16px 22px",borderTop:"1px solid #E7E2D8",position:"sticky",bottom:0,background:"#fff",borderRadius:"0 0 16px 16px"},
      };
      return <div style={S.overlay} onMouseDown={e=>e.target===e.currentTarget&&onClose()}>
        <div style={S.modal} role="dialog" aria-modal="true">
          <div style={S.head}>
            <div style={{fontFamily:"'Fraunces',serif",fontSize:19,fontWeight:600,flex:1}}>{person.name||"New impact story"}</div>
            <button style={{...S.btn,...S.btnGhost,padding:6}} onClick={onClose}><X size={18}/></button>
          </div>
          <div style={S.body}>
            <div style={{paddingBottom:4}}>
              <div style={{fontSize:11,textTransform:"uppercase",letterSpacing:".07em",color:"#C9851D",margin:"18px 0 12px",fontWeight:600}}>Profile</div>
              <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
                <Avatar person={d} size={70} radius={14}/>
                <div>
                  <button style={S.btn} onClick={()=>fileRef.current?.click()}><Camera size={14}/>{d.photo?"Replace photo":"Add photo"}</button>
                  {d.photo&&<button style={{...S.btn,...S.btnGhost,marginLeft:6}} onClick={()=>set("photo","")}>Remove</button>}
                  <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handlePhoto}/>
                  <div style={{fontSize:11.5,color:"#888",marginTop:5}}>No photo? Initials are shown automatically.</div>
                </div>
              </div>
              <div style={S.field}><label style={S.label}>Name</label><input style={S.input} value={d.name} onChange={e=>set("name",e.target.value)} placeholder="e.g. María Quispe"/></div>
              <div style={S.row2}>
                <div style={S.field}><label style={S.label}>Program</label><select style={S.select} value={d.program} onChange={e=>set("program",e.target.value)}>{PROGRAMS.map(p=><option key={p}>{p}</option>)}</select></div>
                <div style={S.field}><label style={S.label}>Location</label><input style={S.input} value={d.location} onChange={e=>set("location",e.target.value)} placeholder="City, country"/></div>
              </div>
              <div style={S.row2}>
                <div style={S.field}><label style={S.label}>Role / relationship</label><input style={S.input} value={d.role} onChange={e=>set("role",e.target.value)} placeholder="Participant, leader…"/></div>
                <div style={S.field}><label style={S.label}>Story status</label><select style={S.select} value={d.status} onChange={e=>set("status",e.target.value)}>{STATUSES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}</select></div>
              </div>
              <div style={S.field}><label style={S.label}>Consent to publish</label><select style={S.select} value={d.consent} onChange={e=>set("consent",e.target.value)}>{CONSENTS.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}</select></div>
            </div>
            <div style={S.section}>
              <div style={S.sectionLabel}>Story material</div>
              <div style={S.field}><label style={S.label}>Raw information & background</label><textarea style={S.textarea} rows={4} value={d.rawInfo} onChange={e=>set("rawInfo",e.target.value)} placeholder="Drop everything the team knows — context, what changed, numbers, names…"/></div>
              <div style={S.field}><label style={S.label}>Quote (in their words)</label><textarea style={S.textarea} rows={2} value={d.quote} onChange={e=>set("quote",e.target.value)} placeholder="A direct quote that captures their voice"/></div>
              <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",margin:"4px 0 8px"}}>
                <button style={{...S.btn,...S.btnGen}} disabled={genLoading||(!d.rawInfo.trim()&&!d.quote.trim())} onClick={generate}>
                  {genLoading?<span style={{width:15,height:15,border:"2px solid rgba(255,255,255,.4)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin .7s linear infinite",display:"inline-block"}}/>:<Sparkles size={14}/>}
                  {genLoading?"Writing…":d.story?"Regenerate story":"Generate polished story"}
                </button>
                <div style={{display:"inline-flex",border:"1px solid #E7E2D8",borderRadius:8,overflow:"hidden"}}>
                  {["en","es"].map(l=><button key={l} style={{border:"none",background:genLang===l?"#14543F":"#fff",color:genLang===l?"#fff":"#888",padding:"8px 13px",fontSize:12,fontWeight:500,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>setGenLang(l)}>{l.toUpperCase()}</button>)}
                </div>
              </div>
              {genError
                ?<div style={{fontSize:12.5,color:"#B9543C",marginBottom:10,display:"flex",alignItems:"center",gap:6}}><AlertCircle size={13}/>{genError}</div>
                :<div style={{fontSize:11.5,color:"#888",marginBottom:12,display:"flex",alignItems:"center",gap:6}}><Sparkles size={12}/>AI draft — review for accuracy and confirm consent before publishing.</div>}
              <div style={S.field}>
                <label style={{...S.label,display:"flex",alignItems:"center",justifyContent:"space-between"}}>Polished story <CopyButton text={d.story}/></label>
                <textarea style={S.textarea} rows={6} value={d.story} onChange={e=>set("story",e.target.value)} placeholder="The publish-ready narrative appears here after generating"/>
              </div>
              <div style={S.row2}>
                <div style={S.field}>
                  <label style={{...S.label,display:"flex",alignItems:"center",justifyContent:"space-between"}}>Social caption <CopyButton text={d.social}/></label>
                  <textarea style={S.textarea} rows={4} value={d.social} onChange={e=>set("social",e.target.value)} placeholder="Instagram / Facebook caption"/>
                </div>
                <div style={S.field}>
                  <label style={{...S.label,display:"flex",alignItems:"center",justifyContent:"space-between"}}>Pull-quote <CopyButton text={d.pullQuote}/></label>
                  <textarea style={S.textarea} rows={4} value={d.pullQuote} onChange={e=>set("pullQuote",e.target.value)} placeholder="One line in her voice"/>
                </div>
              </div>
              <div>
                <button style={{...S.btn,...S.btnDl,opacity:d.story?.trim()?1:0.45}} disabled={!d.story?.trim()||dlDone==="loading"} onClick={handleDownload}>
                  {dlDone==="loading"?<><span style={{width:14,height:14,border:"2px solid rgba(255,255,255,.4)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin .7s linear infinite",display:"inline-block"}}/>Generating PDF…</>
                  :dlDone==="done"?<><Check size={14}/>Downloaded!</>
                  :<><FileDown size={14}/>Export story as PDF</>}
                </button>
              </div>
            </div>
            <div style={S.section}>
              <div style={S.sectionLabel}>Follow-ups</div>
              {!(d.followUps?.length)&&<div style={{fontSize:13,color:"#888",marginBottom:8}}>No updates yet.</div>}
              {(d.followUps||[]).map((f,i)=>(
                <div key={f.id} style={{display:"flex",gap:10,padding:"9px 0",borderBottom:"1px dashed #E7E2D8"}}>
                  <span style={{fontSize:11.5,color:"#C9851D",fontWeight:600,flexShrink:0,width:78}}>{formatDate(f.date)}</span>
                  <span style={{fontSize:13,flex:1,whiteSpace:"pre-wrap"}}>{f.text}</span>
                  <button style={{...S.btn,...S.btnGhost,padding:4}} onClick={()=>set("followUps",d.followUps.filter((_,x)=>x!==i))}><X size={13}/></button>
                </div>
              ))}
              <div style={{display:"flex",gap:8,marginTop:10}}>
                <input style={{...S.input,flex:1}} value={followUpText} onChange={e=>setFollowUpText(e.target.value)} placeholder="Add a new follow-up…" onKeyDown={e=>e.key==="Enter"&&addFollowUp()}/>
                <button style={S.btn} onClick={addFollowUp}><MessageSquarePlus size={14}/>Add</button>
              </div>
            </div>
            <div style={S.section}>
              <div style={S.sectionLabel}>Links</div>
              <div style={S.field}><label style={S.label}>Airtable profile</label><input style={S.input} value={d.airtableUrl} onChange={e=>set("airtableUrl",e.target.value)} placeholder="https://airtable.com/…"/></div>
              <div style={{fontSize:12.5,color:"#5E6B63",fontWeight:500,marginBottom:6}}>Other resources</div>
              {(d.links||[]).map((l,i)=>(
                <div key={i} style={{display:"flex",gap:8,marginBottom:8}}>
                  <input style={{...S.input,flex:"0 0 32%"}} value={l.label} onChange={e=>{const ls=[...d.links];ls[i]={...ls[i],label:e.target.value};set("links",ls);}} placeholder="Label"/>
                  <input style={{...S.input,flex:1}} value={l.url} onChange={e=>{const ls=[...d.links];ls[i]={...ls[i],url:e.target.value};set("links",ls);}} placeholder="https://…"/>
                  <button style={{...S.btn,...S.btnGhost}} onClick={()=>set("links",d.links.filter((_,x)=>x!==i))}><X size={14}/></button>
                </div>
              ))}
              <button style={{...S.btn,...S.btnGhost}} onClick={()=>set("links",[...(d.links||[]),{label:"",url:""}])}><Plus size={14}/>Add link</button>
            </div>
            <div style={S.section}>
              <div style={S.sectionLabel}>Where this story has been used</div>
              {CHANNELS.map(c=>{
                const m=d.media[c.id];
                return <div key={c.id} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0"}}>
                  <div role="checkbox" aria-checked={m.used} tabIndex={0}
                    style={{width:18,height:18,borderRadius:5,border:m.used?"none":"1.5px solid #E7E2D8",background:m.used?"#14543F":"#fff",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,color:"#fff"}}
                    onClick={()=>setMedia(c.id,{used:!m.used})}
                    onKeyDown={e=>(e.key==="Enter"||e.key===" ")&&(e.preventDefault(),setMedia(c.id,{used:!m.used}))}>
                    {m.used&&<Check size={11}/>}
                  </div>
                  <span style={{display:"flex",alignItems:"center",gap:7,fontSize:13,width:160,flexShrink:0}}><c.Icon size={14}/>{c.label}</span>
                  <input style={{...S.input,opacity:m.used?1:0.4}} disabled={!m.used} value={m.url} placeholder={m.used?"Link (optional)":"—"} onChange={e=>setMedia(c.id,{url:e.target.value})}/>
                </div>;
              })}
            </div>
          </div>
          <div style={S.foot}>
            {onDelete&&<button style={{...S.btn,color:"#B9543C",borderColor:"transparent"}} onClick={()=>setConfirmDel(true)}><Trash2 size={14}/>Delete</button>}
            <div style={{flex:1}}/>
            <button style={S.btn} onClick={onClose}>Cancel</button>
            <button style={{...S.btn,...S.btnPrimary,opacity:saving||!d.name.trim()?0.5:1}} disabled={saving||!d.name.trim()} onClick={()=>onSave({...d,updatedAt:Date.now()})}>
              {saving?"Saving…":"Save story"}
            </button>
          </div>
        </div>
        {confirmDel&&<DeleteConfirm onConfirm={()=>{setConfirmDel(false);onDelete(d.id);}} onCancel={()=>setConfirmDel(false)}/>}
      </div>;
    }

    // ── App ────────────────────────────────────────────────
    function App(){
      const [people,setPeople]=useState([]);
      const [loading,setLoading]=useState(true);
      const [saving,setSaving]=useState(false);
      const [editing,setEditing]=useState(null);
      const [search,setSearch]=useState("");
      const [filterProgram,setFilterProgram]=useState("all");
      const [filterStatus,setFilterStatus]=useState("all");
      const [filterMedia,setFilterMedia]=useState("all");
      const [toast,setToast]=useState(null);
      const [lastSync,setLastSync]=useState(null);

      function flash(msg,err=false){setToast({msg,err});setTimeout(()=>setToast(null),2600);}

      async function loadPeople(silent=false){
        try{
          const list=await db.list();
          setPeople(list);
          setLastSync(new Date());
        }catch(e){if(!silent)flash("Couldn't load: "+e.message,true);}
        finally{if(!silent)setLoading(false);}
      }

      useEffect(()=>{
        loadPeople(false);
        const iv=setInterval(()=>loadPeople(true),10000);
        return()=>clearInterval(iv);
      },[]);

      async function save(p){
        setSaving(true);
        try{
          await db.save(p);
          setPeople(prev=>[p,...prev.filter(x=>x.id!==p.id)].sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0)));
          setLastSync(new Date());
          setEditing(null);
          flash("Story saved");
        }catch(e){flash("Save failed: "+e.message,true);}
        finally{setSaving(false);}
      }

      async function remove(id){
        try{
          await db.del(id);
          setPeople(prev=>prev.filter(x=>x.id!==id));
          setEditing(null);
          flash("Story deleted");
        }catch(e){flash("Delete failed: "+e.message,true);}
      }

      const filtered=useMemo(()=>{
        const q=search.trim().toLowerCase();
        return people.filter(p=>{
          if(filterProgram!=="all"&&p.program!==filterProgram)return false;
          if(filterStatus!=="all"&&p.status!==filterStatus)return false;
          const shared=CHANNELS.some(c=>p.media?.[c.id]?.used);
          if(filterMedia==="shared"&&!shared)return false;
          if(filterMedia==="unshared"&&shared)return false;
          if(q){const hay=[p.name,p.location,p.role,p.quote,p.story,p.rawInfo,p.program].join(" ").toLowerCase();if(!hay.includes(q))return false;}
          return true;
        });
      },[people,search,filterProgram,filterStatus,filterMedia]);

      const stats=useMemo(()=>({
        total:people.length,
        ready:people.filter(p=>p.status==="ready").length,
        shared:people.filter(p=>CHANNELS.some(c=>p.media?.[c.id]?.used)).length,
        progress:people.filter(p=>p.status==="progress").length,
      }),[people]);

      const activePrograms=["all",...PROGRAMS.filter(pr=>people.some(p=>p.program===pr))];
      const chipStyle=active=>({border:`1px solid ${active?"#14543F":"#E7E2D8"}`,background:active?"#14543F":"#fff",color:active?"#fff":"#888",padding:"5px 12px",borderRadius:999,fontSize:12.5,cursor:"pointer",fontFamily:"inherit"});

      return <div style={{fontFamily:"'Inter',system-ui,sans-serif",color:"#1B2A24",background:"#FBFAF6",minHeight:"100vh",lineHeight:1.5,WebkitFontSmoothing:"antialiased"}}>
        <div style={{maxWidth:1180,margin:"0 auto",padding:"0 22px 80px"}}>
          <div style={{padding:"28px 0 18px"}}>
            <div style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
              <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                <circle cx="20" cy="20" r="18" stroke="#E7E2D8" strokeWidth="2"/>
                <circle cx="20" cy="20" r="12" stroke="#C9851D" strokeWidth="2"/>
                <circle cx="20" cy="20" r="6" fill="#14543F"/>
              </svg>
              <div>
                <div style={{fontFamily:"'Fraunces',Georgia,serif",fontWeight:600,fontSize:26,letterSpacing:"-.01em"}}>Story Library</div>
                <div style={{color:"#888",fontSize:13.5,marginTop:1}}>United4Change · where raw notes grow into stories worth sharing</div>
              </div>
              <div style={{flex:1}}/>
              {lastSync&&<button onClick={()=>loadPeople(true)} title="Click to refresh now"
                style={{display:"inline-flex",alignItems:"center",gap:5,background:"transparent",border:"1px solid #E7E2D8",color:"#888",padding:"8px 12px",borderRadius:10,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
                <span style={{width:7,height:7,borderRadius:"50%",background:"#14543F",display:"inline-block"}}/>
                Synced {lastSync.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}
              </button>}
              <button style={{display:"inline-flex",alignItems:"center",gap:7,background:"#14543F",color:"#fff",border:"1px solid #14543F",padding:"10px 14px",borderRadius:10,fontSize:13.5,fontWeight:500,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>setEditing(newPerson())}>
                <Plus size={16}/>New story
              </button>
            </div>
            <div style={{position:"relative",marginTop:18}}>
              <Search size={16} style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"#888"}}/>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search names, places, quotes, stories…"
                style={{width:"100%",padding:"10px 12px 10px 38px",border:"1px solid #E7E2D8",borderRadius:10,fontSize:14,background:"#fff",color:"#1B2A24",fontFamily:"inherit",outline:"none"}}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,margin:"22px 0 10px"}}>
              {[{n:stats.total,l:"Stories in the library"},{n:stats.ready,l:"Ready to share",accent:true},{n:stats.shared,l:"Already published"},{n:stats.progress,l:"In progress"}].map(({n,l,accent})=>(
                <div key={l} style={{background:"#fff",border:"1px solid #E7E2D8",borderRadius:12,padding:"14px 16px"}}>
                  <div style={{fontFamily:"'Fraunces',Georgia,serif",fontSize:28,fontWeight:600,lineHeight:1,color:accent?"#14543F":"#1B2A24"}}>{n}</div>
                  <div style={{fontSize:12,color:"#888",marginTop:6}}>{l}</div>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",margin:"16px 0 8px"}}>
              <span style={{fontSize:12,color:"#888",marginRight:2}}>Program</span>
              {activePrograms.map(p=><button key={p} style={chipStyle(filterProgram===p)} onClick={()=>setFilterProgram(p)}>{p==="all"?"All":p}</button>)}
              <div style={{width:1,height:22,background:"#E7E2D8",margin:"0 4px"}}/>
              <span style={{fontSize:12,color:"#888",marginRight:2}}>Status</span>
              <button style={chipStyle(filterStatus==="all")} onClick={()=>setFilterStatus("all")}>All</button>
              {STATUSES.map(s=><button key={s.id} style={chipStyle(filterStatus===s.id)} onClick={()=>setFilterStatus(s.id)}>{s.label}</button>)}
              <div style={{width:1,height:22,background:"#E7E2D8",margin:"0 4px"}}/>
              <button style={chipStyle(filterMedia==="shared")} onClick={()=>setFilterMedia(filterMedia==="shared"?"all":"shared")}>Published</button>
              <button style={chipStyle(filterMedia==="unshared")} onClick={()=>setFilterMedia(filterMedia==="unshared"?"all":"unshared")}>Not used yet</button>
            </div>
          </div>
          {loading?(
            <div style={{textAlign:"center",padding:"70px 20px",color:"#888"}}>
              <div style={{fontFamily:"'Fraunces',serif",fontSize:21,color:"#1B2A24",marginBottom:6}}>Opening the library…</div>
            </div>
          ):people.length===0?(
            <div style={{textAlign:"center",padding:"70px 20px",color:"#888"}}>
              <div style={{fontFamily:"'Fraunces',serif",fontSize:21,color:"#1B2A24",marginBottom:6}}>No stories yet</div>
              <p>Add the first person your team is following.</p>
              <button style={{display:"inline-flex",alignItems:"center",gap:7,background:"#14543F",color:"#fff",border:"1px solid #14543F",padding:"10px 16px",borderRadius:10,fontSize:13.5,fontWeight:500,cursor:"pointer",fontFamily:"inherit",marginTop:14}} onClick={()=>setEditing(newPerson())}><Plus size={15}/>New story</button>
            </div>
          ):filtered.length===0?(
            <div style={{textAlign:"center",padding:"70px 20px",color:"#888"}}>
              <div style={{fontFamily:"'Fraunces',serif",fontSize:21,color:"#1B2A24",marginBottom:6}}>Nothing matches</div>
              <p>Try a different search or clear the filters.</p>
            </div>
          ):(
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:16,marginTop:16}}>
              {filtered.map(p=><Card key={p.id} person={p} onOpen={setEditing}/>)}
            </div>
          )}
          <div style={{fontSize:12,color:"#5E6B63",display:"flex",alignItems:"center",gap:7,background:"#E5EEE9",padding:"9px 13px",borderRadius:9,marginTop:20}}>
            <ShieldCheck size={15}/>
            This library is shared across everyone who opens it. The consent field tracks what each person agreed to publish.
          </div>
        </div>
        {editing&&<Editor person={editing} saving={saving} onSave={save} onClose={()=>setEditing(null)} onDelete={people.some(p=>p.id===editing.id)?remove:null}/>}
        {toast&&<div style={{position:"fixed",bottom:22,left:"50%",transform:"translateX(-50%)",background:toast.err?"#B9543C":"#1B2A24",color:"#fff",padding:"11px 18px",borderRadius:10,fontSize:13.5,zIndex:80,display:"flex",alignItems:"center",gap:8,boxShadow:"0 10px 30px rgba(0,0,0,.25)",whiteSpace:"nowrap"}}>
          {toast.err?<AlertCircle size={15}/>:<Check size={15}/>}{toast.msg}
        </div>}
      </div>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
